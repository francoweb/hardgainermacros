<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Hardgainer Macros</title>
  <script>
    // GitHub Pages SPA fallback:
    // redireciona qualquer 404 para a raiz preservando o path.
    var path = window.location.pathname + window.location.search + window.location.hash;
    sessionStorage.setItem('spa-redirect', path);
    window.location.replace('/');
  </script>
</head>
<body>
  <noscript>
    <p>Esta página requer JavaScript. <a href="/">Ir para o início</a>.</p>
  </noscript>
</body>
</html>
